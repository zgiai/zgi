version: "3.8"

services:
  plugin-runner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_REGION: ${BUILD_REGION:-global}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        UV_INDEX_URL: ${UV_INDEX_URL:-}
        GOPROXY: ${GOPROXY:-}
    container_name: plugin-runner
    ports:
      - "15000:15000"
    env_file:
      - .env
    environment:
      # Override paths for container (these are fixed in container)
      EXECUTOR_PLUGIN_HOME: /app/plugins
      EXECUTOR_WORKSPACE_PATH: /app/workspace
      EXECUTOR_PACKAGE_CACHE_PATH: /app/cache
      EXECUTOR_PYTHON_INTERPRETER: python3
      EXECUTOR_NODE_INTERPRETER: node
      EXECUTOR_UV_PATH: /usr/local/bin/uv
      EXECUTOR_PIP_COMMAND: pip3
    volumes:
      - plugin-data:/app/plugins
      - workspace-data:/app/workspace
      - cache-data:/app/cache
    restart: unless-stopped
    networks:
      - zgi-api-network

volumes:
  plugin-data:
  workspace-data:
  cache-data:

networks:
  zgi-api-network:
    external: true
    name: zgi-api_zgi-network
