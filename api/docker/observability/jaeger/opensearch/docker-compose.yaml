services:
  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.3}
    container_name: zgi-observability-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-ChangeMeStrongPassword123!}
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
    volumes:
      - jaeger-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:${JAEGER_VERSION:-2.17.0}
    container_name: zgi-observability-jaeger-opensearch
    command: ["--config=/etc/jaeger/config.yaml"]
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-14317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-14318}:4318"
    volumes:
      - ./jaeger-config.yaml:/etc/jaeger/config.yaml:ro
    restart: unless-stopped

volumes:
  jaeger-opensearch-data:
    driver: local
