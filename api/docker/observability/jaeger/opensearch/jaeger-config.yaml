service:
  extensions: [jaeger_storage, jaeger_query, healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info

extensions:
  healthcheckv2:
    use_v2: true
    http:
      endpoint: 0.0.0.0:13133

  jaeger_query:
    storage:
      traces: opensearch_store
      traces_archive: opensearch_archive
    http:
      endpoint: 0.0.0.0:16686

  jaeger_storage:
    backends:
      opensearch_store:
        opensearch:
          server_urls:
            - ${env:OPENSEARCH_URL:-http://opensearch:9200}
          indices:
            index_prefix: jaeger-main
            spans:
              date_layout: "2006-01-02"
              rollover_frequency: day
              shards: 1
              replicas: 0
            services:
              date_layout: "2006-01-02"
              rollover_frequency: day
              shards: 1
              replicas: 0
            dependencies:
              date_layout: "2006-01-02"
              rollover_frequency: day
              shards: 1
              replicas: 0
            sampling:
              date_layout: "2006-01-02"
              rollover_frequency: day
              shards: 1
              replicas: 0
      opensearch_archive:
        opensearch:
          server_urls:
            - ${env:OPENSEARCH_URL:-http://opensearch:9200}
          indices:
            index_prefix: jaeger-archive

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: opensearch_store
