services:
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:${JAEGER_VERSION:-2.17.0}
    container_name: zgi-observability-jaeger-badger
    command: ["--config=/etc/jaeger/config.yaml"]
    environment:
      JAEGER_BADGER_TTL: ${JAEGER_BADGER_TTL:-168h}
      JAEGER_BADGER_ARCHIVE_TTL: ${JAEGER_BADGER_ARCHIVE_TTL:-720h}
      BADGER_METRICS_UPDATE_INTERVAL: ${BADGER_METRICS_UPDATE_INTERVAL:-10s}
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-14317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-14318}:4318"
    volumes:
      - ./jaeger-config.yaml:/etc/jaeger/config.yaml:ro
      - jaeger-badger-data:/var/lib/jaeger
    restart: unless-stopped

volumes:
  jaeger-badger-data:
    driver: local
