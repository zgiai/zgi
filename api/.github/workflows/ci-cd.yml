  # 构建 Docker 镜像（测试环境）
  build-test:
    name: Build Test Image
    runs-on: self-hosted
    # needs: [test]  # 已注释，直接构建，不等待测试
    permissions:
      contents: read
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      github.ref_type != 'tag'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: network=host

    - name: Debug - Check secrets availability
      run: |
        echo "=========================================="
        echo "Secrets 调试信息 (Test Build)"
        echo "=========================================="
        echo "Runner: self-hosted (服务器: 47.253.133.65)"
        echo "执行位置: $(hostname)"
        echo "执行用户: $(whoami)"
        echo ""
        echo "检查 DOCKER_HUB_USERNAME:"
        if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ]; then
          echo "❌ DOCKER_HUB_USERNAME 为空或未设置"
        else
          echo "✅ DOCKER_HUB_USERNAME 已设置"
        fi
        echo ""
        echo "检查 DOCKER_HUB_TOKEN:"
        if [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
          echo "❌ DOCKER_HUB_TOKEN 为空或未设置"
        else
          echo "✅ DOCKER_HUB_TOKEN 已设置"
        fi
        echo ""
        echo "环境变量:"
        echo "  REGISTRY: ${{ env.REGISTRY }}"
        echo "  IMAGE_NAME: ${{ env.IMAGE_NAME }}"
        echo ""
        echo "说明:"
        echo "  - 此步骤在服务器 (self-hosted runner) 上执行"
        echo "  - Secrets 从 GitHub 传递到服务器"
        echo "  - 如果 secrets 为空，说明 GitHub 未正确传递"
        echo "=========================================="

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Determine test image tag
      id: tags
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest" >> $GITHUB_OUTPUT
          echo "version=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
        else
          BRANCH=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "version=dev-${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
        fi

    - name: Build and push test image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
        platforms: linux/amd64
        provenance: false
        outputs: type=registry,push=true,push-by-digest=false

    - name: Test image summary
      run: |
        echo "## Test Image Built" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:** ${{ steps.tags.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ steps.tags.outputs.version }}" >> $GITHUB_STEP_SUMMARY

    - name: Notify Feishu on success
      if: success()
      run: |
        if [ -z "${{ secrets.FEISHU_WEBHOOK_URL }}" ]; then
          echo "FEISHU_WEBHOOK_URL is not configured; skipping Feishu notification."
          exit 0
        fi
        curl -X POST -H "Content-Type: application/json" \
          -d '{
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {"tag": "plain_text", "content": "\u2705 ZGI API Build Success"},
                "template": "green"
              },
              "elements": [
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Repository:** ${{ github.repository }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Branch:** ${{ github.ref_name }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Commit:** ${{ github.sha }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Image:** `${{ steps.tags.outputs.version }}`"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Trigger:** ${{ github.actor }}"}},
                {"tag": "action", "actions": [{"tag": "button", "text": {"tag": "plain_text", "content": "View Workflow"}, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "type": "primary"}]}
              ]
            }
          }' \
          "${{ secrets.FEISHU_WEBHOOK_URL }}"

    - name: Notify Feishu on failure
      if: failure()
      run: |
        if [ -z "${{ secrets.FEISHU_WEBHOOK_URL }}" ]; then
          echo "FEISHU_WEBHOOK_URL is not configured; skipping Feishu notification."
          exit 0
        fi
        curl -X POST -H "Content-Type: application/json" \
          -d '{
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {"tag": "plain_text", "content": "\u274c ZGI API Build Failed"},
                "template": "red"
              },
              "elements": [
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Repository:** ${{ github.repository }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Branch:** ${{ github.ref_name }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Commit:** ${{ github.sha }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Trigger:** ${{ github.actor }}"}},
                {"tag": "action", "actions": [{"tag": "button", "text": {"tag": "plain_text", "content": "View Workflow"}, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "type": "danger"}]}
              ]
            }
          }' \
          "${{ secrets.FEISHU_WEBHOOK_URL }}"

  # 集成测试（使用测试镜像）（已注释，后续启用）
  # integration-test:
  #   name: Integration Tests
  #   runs-on: self-hosted
  #   needs: [build-test]
  #   if: |
