name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - test
          - staging
          - production

env:
  REGISTRY: docker.io
  IMAGE_NAME: zgiai/zgi-api
  GO_VERSION: '1.26.2'

jobs:
