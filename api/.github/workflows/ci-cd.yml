  #       echo "Integration tests would run here"
  #       # go test -v -tags=integration ./tests/integration/...

  # 构建正式版本镜像（仅当创建 tag 时）
  build-release:
    name: Build Release Image
    runs-on: self-hosted
    # needs: [test]  # 已注释，直接构建，不等待测试
    permissions:
      contents: read
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: network=host

    - name: Debug - Check secrets availability
      run: |
        echo "=========================================="
        echo "Secrets 调试信息 (Release Build)"
        echo "=========================================="
        echo "Runner: self-hosted (服务器: 47.253.133.65)"
        echo "执行位置: $(hostname)"
        echo ""
        echo "检查 DOCKER_HUB_USERNAME:"
        if [ -z "${{ secrets.DOCKER_HUB_USERNAME }}" ]; then
          echo "❌ DOCKER_HUB_USERNAME 为空或未设置"
        else
          echo "✅ DOCKER_HUB_USERNAME 已设置"
        fi
        echo ""
        echo "检查 DOCKER_HUB_TOKEN:"
        if [ -z "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
          echo "❌ DOCKER_HUB_TOKEN 为空或未设置"
        else
          echo "✅ DOCKER_HUB_TOKEN 已设置"
        fi
        echo "=========================================="

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Extract version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "full_version=v${VERSION}" >> $GITHUB_OUTPUT

        # 解析语义化版本
        IFS='.' read -ra ADDR <<< "${VERSION}"
        MAJOR=${ADDR[0]}
        MINOR=${ADDR[1]}
        PATCH=${ADDR[2]}

        echo "major=${MAJOR}" >> $GITHUB_OUTPUT
        echo "minor=${MINOR}" >> $GITHUB_OUTPUT
        echo "patch=${PATCH}" >> $GITHUB_OUTPUT

    - name: Determine release tags
      id: tags
      run: |
        VERSION=${{ steps.version.outputs.version }}
        MAJOR=${{ steps.version.outputs.major }}
        MINOR=${{ steps.version.outputs.minor }}

        # 构建多个标签：完整版本、主版本.次版本、主版本、latest
        TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${VERSION}"
        TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MAJOR}.${MINOR}"
        TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MAJOR}"
        TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

        echo "tags=${TAGS}" >> $GITHUB_OUTPUT

    - name: Build and push release image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
        platforms: linux/amd64
        provenance: false
        outputs: type=registry,push=true,push-by-digest=false
        labels: |
          org.opencontainers.image.title=ZGI API
          org.opencontainers.image.version=${{ steps.version.outputs.full_version }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: Release ${{ steps.version.outputs.full_version }}
        body: |
          ## Release ${{ steps.version.outputs.full_version }}

          ### Docker Images
          - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}`
          - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}`
          - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}`
          - `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest`

          ### Pull Command
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
          ```
        draft: false
        prerelease: false

    - name: Release summary
      run: |
        echo "## Release Image Built" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ steps.version.outputs.full_version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:** ${{ steps.tags.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Release image successfully pushed to Docker Hub!" >> $GITHUB_STEP_SUMMARY

    - name: Notify Feishu on release success
      if: success()
      run: |
        if [ -z "${{ secrets.FEISHU_WEBHOOK_URL }}" ]; then
          echo "FEISHU_WEBHOOK_URL is not configured; skipping Feishu notification."
          exit 0
        fi
        curl -X POST -H "Content-Type: application/json" \
          -d '{
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {"tag": "plain_text", "content": "\ud83d\ude80 ZGI API Release Published"},
                "template": "blue"
              },
              "elements": [
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Version:** ${{ steps.version.outputs.full_version }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Repository:** ${{ github.repository }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Commit:** ${{ github.sha }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Trigger:** ${{ github.actor }}"}},
                {"tag": "hr"},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Docker Pull:**\n```docker pull docker.io/zgiai/zgi-api:${{ steps.version.outputs.full_version }}```"}},
                {"tag": "action", "actions": [{"tag": "button", "text": {"tag": "plain_text", "content": "View Release"}, "url": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.full_version }}", "type": "primary"}]}
              ]
            }
          }' \
          "${{ secrets.FEISHU_WEBHOOK_URL }}"

    - name: Notify Feishu on release failure
      if: failure()
      run: |
        if [ -z "${{ secrets.FEISHU_WEBHOOK_URL }}" ]; then
          echo "FEISHU_WEBHOOK_URL is not configured; skipping Feishu notification."
          exit 0
        fi
        curl -X POST -H "Content-Type: application/json" \
          -d '{
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {"tag": "plain_text", "content": "\u274c ZGI API Release Failed"},
                "template": "red"
              },
              "elements": [
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Version:** ${{ github.ref_name }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Repository:** ${{ github.repository }}"}},
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Trigger:** ${{ github.actor }}"}},
                {"tag": "action", "actions": [{"tag": "button", "text": {"tag": "plain_text", "content": "View Workflow"}, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "type": "danger"}]}
              ]
            }
          }' \
          "${{ secrets.FEISHU_WEBHOOK_URL }}"
