<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{brand_name}} - 验证码</title>
    <!--[if mso]>
    <noscript>
      <xml>
        <o:OfficeDocumentSettings>
          <o:PixelsPerInch>96</o:PixelsPerInch>
        </o:OfficeDocumentSettings>
      </xml>
    </noscript>
    <![endif]-->
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        color: #1a1a2e;
        background-color: #f0f2f5;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .wrapper {
        width: 100%;
        background-color: #f0f2f5;
        padding: 40px 0;
      }
      .container {
        max-width: 520px;
        margin: 0 auto;
        padding: 40px 48px;
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      .header {
        text-align: center;
        margin-bottom: 32px;
        padding-bottom: 24px;
        border-bottom: 1px solid #eef0f3;
      }
      .logo {
        max-height: 48px;
        width: auto;
      }
      .brand-text {
        font-size: 24px;
        font-weight: 700;
        color: #6366f1;
        letter-spacing: -0.5px;
      }
      .title {
        font-weight: 600;
        font-size: 22px;
        line-height: 1.3;
        color: #1a1a2e;
        margin: 0 0 12px 0;
      }
      .description {
        font-size: 14px;
        line-height: 1.6;
        color: #64748b;
        margin: 0 0 24px 0;
      }
      .code-container {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        padding: 4px;
        margin: 24px 0;
      }
      .code-content {
        padding: 20px 32px;
        text-align: center;
        border-radius: 10px;
        background-color: #f8fafc;
      }
      .code {
        font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 8px;
        color: #1a1a2e;
        margin: 0;
      }
      .expire-notice {
        display: inline-block;
        margin-top: 16px;
        padding: 6px 12px;
        background-color: #fef3c7;
        border-radius: 6px;
        font-size: 12px;
        color: #92400e;
      }
      .tips {
        font-size: 13px;
        line-height: 1.6;
        color: #94a3b8;
        margin: 24px 0 0 0;
        padding-top: 20px;
        border-top: 1px solid #eef0f3;
      }
      .footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid #eef0f3;
      }
      .footer-text {
        font-size: 12px;
        color: #94a3b8;
        margin: 0;
      }
      @media only screen and (max-width: 600px) {
        .container {
          margin: 0 16px;
          padding: 32px 24px;
        }
        .code {
          font-size: 28px;
          letter-spacing: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="header">
          <!--[if mso]>
          <table role="presentation" width="100%"><tr><td style="text-align: center;">
          <![endif]-->
          <img src="{{logo_url}}" alt="{{brand_name}}" class="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
          <span class="brand-text" style="display: none;">{{brand_name}}</span>
          <!--[if mso]>
          </td></tr></table>
          <![endif]-->
        </div>
        <p class="title">请输入下方验证码</p>
        <p class="description">请使用下方验证码完成验证。该验证码在 5 分钟内有效。</p>
        <div class="code-container">
          <div class="code-content">
            <p class="code">{{code}}</p>
          </div>
        </div>
        <p style="text-align: center; margin: 0;">
          <span class="expire-notice">5 分钟内有效</span>
        </p>
        <p class="tips">如果这不是您的操作，请忽略此邮件。可能有人误填了您的邮箱地址。</p>
        <div class="footer">
          <p class="footer-text">&copy; {{brand_name}}。版权所有。</p>
        </div>
      </div>
    </div>
  </body>
</html>
