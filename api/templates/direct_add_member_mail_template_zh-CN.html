<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{brand_name}} - 成员通知</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: #1a1a2e;
        background-color: #f0f2f5;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .wrapper {
        width: 100%;
        background-color: #f0f2f5;
        padding: 40px 0;
      }
      .container {
        max-width: 520px;
        margin: 0 auto;
        padding: 40px 48px;
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      .header {
        text-align: center;
        margin-bottom: 24px;
        padding-bottom: 20px;
        border-bottom: 1px solid #eef0f3;
      }
      .logo {
        max-height: 40px;
        width: auto;
      }
      .brand-text {
        font-size: 20px;
        font-weight: 700;
        color: #6366f1;
        letter-spacing: -0.5px;
      }
      .title {
        font-weight: 600;
        font-size: 20px;
        line-height: 1.3;
        color: #1a1a2e;
        margin: 0 0 12px 0;
      }
      .description {
        font-size: 14px;
        line-height: 1.6;
        color: #64748b;
        margin: 0 0 24px 0;
      }
      .button {
        display: inline-block;
        padding: 12px 24px;
        border-radius: 999px;
        background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #8b5cf6 100%);
        color: #ffffff !important;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.25);
      }
      .button:hover {
        background: linear-gradient(135deg, #4338ca 0%, #4f46e5 50%, #7c3aed 100%);
      }
      .footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #eef0f3;
        font-size: 12px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="header">
          <img src="{{logo_url}}" alt="{{brand_name}}" class="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
          <span class="brand-text" style="display: none;">{{brand_name}}</span>
        </div>
        <h1 class="title">您已被添加到 {{group_name}}</h1>
        <p class="description">
          您好，{{to}}：<br />
          管理员已将您的账号添加到 {{group_name}}{{department_text}}。您可以点击下方按钮完成账号设置并开始使用。
        </p>
        <p style="text-align: center; margin: 32px 0;">
          <a href="{{url}}" class="button">完成账号设置</a>
        </p>
        <p class="description">
          如果您并不知晓此操作，可能是管理员误填了邮箱地址，请忽略本邮件。
        </p>
        <div class="footer">
          <p>&copy; {{brand_name}}。版权所有。</p>
        </div>
      </div>
    </div>
  </body>
</html>
