services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:-2679}:2679"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2679/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zgi}
      POSTGRES_SQL_BASE_DB: ${POSTGRES_SQL_BASE_DB:-zgi_sql_base}
      POSTGRES_RUNNER_DB: ${POSTGRES_RUNNER_DB:-${POSTGRES_PLUGIN_RUNNER_DB:-zgi_runner}}
      POSTGRES_SANDBOX_DB: ${POSTGRES_SANDBOX_DB:-zgi_sandbox}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in docker/.env or your environment}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zgi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      default:
        aliases:
          - zgi-postgres

  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zgi}
      POSTGRES_SQL_BASE_DB: ${POSTGRES_SQL_BASE_DB:-zgi_sql_base}
      POSTGRES_RUNNER_DB: ${POSTGRES_RUNNER_DB:-${POSTGRES_PLUGIN_RUNNER_DB:-zgi_runner}}
      POSTGRES_SANDBOX_DB: ${POSTGRES_SANDBOX_DB:-zgi_sandbox}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in docker/.env or your environment}
      PGHOST: postgres
      PGPORT: 5432
    volumes:
      - ./postgres/init:/scripts:ro
    command: ["/bin/sh", "/scripts/01-init-multiple-dbs.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in docker/.env or your environment}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in docker/.env or your environment}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      default:
        aliases:
          - zgi-redis

  weaviate:
    profiles:
      - knowledge
    image: cr.weaviate.io/semitechnologies/weaviate:1.35.4
    working_dir: /go/pkg/mod
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: "25"
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
      ENABLE_TOKENIZER_GSE_CH: "true"
      TOKENIZER_CONCURRENCY_COUNT: "2"
    volumes:
      - weaviate-data:/var/lib/weaviate
    ports:
      - "${WEAVIATE_PORT:-18080}:8080"
    restart: unless-stopped

  sandbox:
    profiles:
      - runtime
    image: ${SANDBOX_IMAGE_NAME:-zgi-sandbox}:${IMAGE_TAG:-latest}
    build:
      context: ../sandbox
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
    env_file:
      - ../sandbox/.env
    environment:
      ZGI_SANDBOX_SERVER_PORT: 2660
      ZGI_SANDBOX_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in docker/.env or your environment}@postgres:5432/${POSTGRES_SANDBOX_DB:-zgi_sandbox}?sslmode=disable
      ZGI_SANDBOX_REDIS_ADDR: redis:6379
      ZGI_SANDBOX_REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in docker/.env or your environment}
      ZGI_SANDBOX_REDIS_DB: ${SANDBOX_REDIS_DB:-1}
      ZGI_SANDBOX_DEPENDENCY_ROOTFS_DIR: ${ZGI_SANDBOX_DEPENDENCY_ROOTFS_DIR:-/var/lib/zgi-sandbox/dependency-rootfs}
      ZGI_SANDBOX_REQUIRED_DEPENDENCY_PROFILES: ${ZGI_SANDBOX_REQUIRED_DEPENDENCY_PROFILES:-skill-office}
      ZGI_SANDBOX_PREBUILT_DEPENDENCY_ROOTFS_DIR: ${ZGI_SANDBOX_PREBUILT_DEPENDENCY_ROOTFS_DIR:-/opt/zgi/prebuilt-dependency-rootfs}
      ZGI_SANDBOX_MAX_DEPENDENCY_PROFILE_SIZE_BYTES: ${ZGI_SANDBOX_MAX_DEPENDENCY_PROFILE_SIZE_BYTES:-1073741824}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - sandbox-data:/var/lib/zgi-sandbox
    ports:
      - "${SANDBOX_PORT:-2660}:2660"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import json, sys, urllib.request; res=urllib.request.urlopen('http://127.0.0.1:2660/ready', timeout=3); body=json.load(res); sys.exit(0 if res.getcode() == 200 and body.get('ready') is True else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      default:
        aliases:
          - zgi-sandbox

  api:
    image: ${API_IMAGE_NAME:-docker.io/zgiai/zgi-api}:${IMAGE_TAG:-latest}
    build:
      context: ../api
      dockerfile: Dockerfile
      args:
        BUILD_REGION: ${BUILD_REGION:-global}
        GOPROXY: ${GOPROXY:-}
        APK_MIRROR: ${APK_MIRROR:-}
    env_file:
      - ../api/.env.docker
    environment:
      SERVER_PORT: 2670
      FILES_URL: ${PUBLIC_URL:-http://localhost:${PUBLIC_PORT:-2679}}
      WEB_API_CORS_ALLOW_ORIGINS: ${WEB_API_CORS_ALLOW_ORIGINS:-http://localhost:2679}
      VECTOR_STORE: ${VECTOR_STORE:-weaviate}
      WEAVIATE_ENDPOINT: ${WEAVIATE_ENDPOINT:-http://weaviate:8080}
      CODE_EXECUTION_ENDPOINT: ${CODE_EXECUTION_ENDPOINT:-http://zgi-sandbox:2660}
      PLUGIN_RUNNER_ENABLED: ${PLUGIN_RUNNER_ENABLED:-true}
      PLUGIN_RUNNER_URL: ${PLUGIN_RUNNER_URL:-http://runner:2665}
      MARKETPLACE_API_URL: ${MARKETPLACE_API_URL:-https://market.zgiai.com}
      MARKETPLACE_BASE_URL: ${MARKETPLACE_BASE_URL:-${MARKETPLACE_API_URL:-https://market.zgiai.com}}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - api-storage:/app/storage
      - api-logs:/app/logs
    ports:
      - "${API_PORT:-2670}:2670"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:2670/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  runner:
    profiles:
      - runtime
    image: ${RUNNER_IMAGE_NAME:-zgi-runner}:${IMAGE_TAG:-latest}
    build:
      context: ../runner
      dockerfile: Dockerfile
      args:
        BUILD_REGION: ${BUILD_REGION:-global}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        UV_INDEX_URL: ${UV_INDEX_URL:-}
        GOPROXY: ${GOPROXY:-}
    env_file:
      - ../runner/.env
    environment:
      EXECUTOR_HTTP_PORT: 2665
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - runner-data:/app/plugins
      - runner-workspace:/app/workspace
      - runner-cache:/app/cache
    ports:
      - "${RUNNER_PORT:-2665}:2665"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2665/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE_NAME:-zgi-web}:${IMAGE_TAG:-latest}
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        BUILD_REGION: ${BUILD_REGION:-global}
        APK_MIRROR: ${APK_MIRROR:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        NEXT_BUILD_CPUS: ${NEXT_BUILD_CPUS:-2}
        NEXT_STATIC_GENERATION_MAX_CONCURRENCY: ${NEXT_STATIC_GENERATION_MAX_CONCURRENCY:-2}
        NEXT_TURBOPACK_MEMORY_LIMIT_MB: ${NEXT_TURBOPACK_MEMORY_LIMIT_MB:-2048}
        NEXT_BUILD_NODE_MEMORY_MB: ${NEXT_BUILD_NODE_MEMORY_MB:-2048}
        NEXT_WEBPACK_MEMORY_OPTIMIZATIONS: ${NEXT_WEBPACK_MEMORY_OPTIMIZATIONS:-true}
        CUSTOMER_PRESERVE_GENERATED: ${CUSTOMER_PRESERVE_GENERATED:-}
        CUSTOMER_REQUIRED: ${CUSTOMER_REQUIRED:-}
    env_file:
      - ../web/.env.local
    environment:
      PORT: 2680
      API_URL: http://api:2670
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost:${PUBLIC_PORT:-2679}}
      MARKETPLACE_API_URL: ${MARKETPLACE_API_URL:-https://market.zgiai.com}
      PM2_INSTANCES: ${PM2_INSTANCES:-2}
      NEXT_TELEMETRY_DISABLED: "1"
      DEPLOY_ENV: local
      EDITION: ${EDITION:-SELF_HOSTED}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-2680}:2680"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:2680/env.js').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  api-storage:
  api-logs:
  postgres-data:
  redis-data:
  weaviate-data:
  sandbox-data:
  runner-data:
  runner-workspace:
  runner-cache:
