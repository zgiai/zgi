name: Sync deploy-dev

on:
  push:
    branches:
      - dev
    paths:
      - "web/**"
      - "vercel.json"
      - ".github/workflows/sync-deploy-dev.yml"
      - ".github/workflows/vercel-web-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-deploy-dev
  cancel-in-progress: true

jobs:
  sync:
    name: Sync dev to deploy-dev
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_GITHUB_TOKEN || github.token }}

      - name: Configure deploy identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push deploy-dev
        run: |
          git fetch origin dev
          source_sha="$(git rev-parse origin/dev)"
          source_short_sha="$(git rev-parse --short origin/dev)"
          source_subject="$(git log -1 --format=%s origin/dev)"
          git checkout -B deploy-dev origin/dev
          git commit --allow-empty \
            -m "chore: deploy dev ${source_short_sha}" \
            -m "Source commit: ${source_sha}" \
            -m "Source subject: ${source_subject}"
          git push --force-with-lease origin deploy-dev
