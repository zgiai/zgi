services:
  zgi-web:
    image: ${WEB_IMAGE:-zgi-web:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: ${BASE_PATH:-${NEXT_PUBLIC_BASE_PATH:-}}
        NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-${NEXT_PUBLIC_BASE_PATH:-}}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-}
        NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-}
        NEXT_PUBLIC_LOGO_URL: ${NEXT_PUBLIC_LOGO_URL:-}
        NEXT_PUBLIC_DARK_LOGO_URL: ${NEXT_PUBLIC_DARK_LOGO_URL:-}
        NEXT_PUBLIC_FAVICON_URL: ${NEXT_PUBLIC_FAVICON_URL:-}
        NEXT_PUBLIC_ICON_TEXT: ${NEXT_PUBLIC_ICON_TEXT:-}
        NEXT_PUBLIC_IS_CLOUD: ${NEXT_PUBLIC_IS_CLOUD:-}
    container_name: ${WEB_CONTAINER_NAME:-zgi-web}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-2680}:${PORT:-2680}"
    env_file:
      - ${DOCKER_ENV_FILE:-.env}
    environment:
      BASE_PATH: ${BASE_PATH:-${NEXT_PUBLIC_BASE_PATH:-}}
      NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-${NEXT_PUBLIC_BASE_PATH:-}}
      API_URL: ${API_URL:-http://host.docker.internal:2670}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:2670}
      TZ: ${TZ:-Asia/Shanghai}
      PORT: ${PORT:-2680}
      PM2_INSTANCES: ${PM2_INSTANCES:-2}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      NEXT_PUBLIC_IS_CLOUD: ${NEXT_PUBLIC_IS_CLOUD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const bp=(process.env.NEXT_PUBLIC_BASE_PATH||process.env.BASE_PATH||'').replace(/\/+$/,'');const port=process.env.PORT||2680;const p=(bp?bp:'')+'/env.js';require('http').get('http://127.0.0.1:'+port+p,res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
